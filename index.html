<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Base meta — overridden per industry by react-helmet-async -->
    <title>Jenco IT Solutions — Managed IT Services</title>
    <meta name="description" content="Purpose-built managed IT, cybersecurity, and cloud services for BC businesses across five industry verticals." />

    <!-- Performance: preconnect to font + image CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#080C10" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/logoHeader.png" />

    <!-- Open Graph base -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jenco IT Solutions" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
